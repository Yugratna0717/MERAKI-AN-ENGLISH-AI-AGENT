<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}MERAKI{% endblock %}
    </title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
          rel="stylesheet">


    <!-- Main CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">


    <!-- Animations -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/animations.css') }}">


    {% block extra_css %}

    {% endblock %}

</head>

<body>


    <!-- =============================
                NAVBAR
    ============================== -->

    <header class="navbar">

<div class="logo">
    <a href="{{ url_for('home') }}">MERAKI</a>
</div>


<nav>

    <a href="#workspace">Workspace</a>

    <a href="#features">Features</a>

    <a href="#about">About</a>

</nav>

    </header>



    <!-- =============================
              PAGE CONTENT
    ============================== -->

    <main>

        {% block content %}

        {% endblock %}

    </main>



    <!-- =============================
             FOOTER
    ============================== -->

    <footer>

        MERAKI

    </footer>



    <!-- =============================
             JAVASCRIPT
    ============================== -->

   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="{{ url_for('static',
        filename='js/script.js') }}"></script>


    {% block extra_js %}

    {% endblock %}

</body>

</html>
